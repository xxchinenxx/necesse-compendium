<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Necesse Compendium — Item & Source Lookup</title>
<style>
  :root{
    --ink-black:#15140f;
    --parchment:#e7d9b4;
    --parchment-light:#f1e6c8;
    --parchment-dark:#d2c19a;
    --forest:#23311f;
    --forest-deep:#161f14;
    --rune-gold:#c9952f;
    --rune-gold-bright:#e8b955;
    --blood:#7a2424;
    --blood-bright:#a83434;
    --slate:#2c3b46;
    --slate-light:#42596a;
    --line:#8a7445;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--forest-deep);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(201,149,47,0.06), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(122,36,36,0.07), transparent 45%);
    color:var(--parchment);
    font-family:'Georgia','Iowan Old Style',serif;
    min-height:100vh;
  }

  .wrap{ max-width:980px; margin:0 auto; padding:28px 18px 80px; }

  /* ---------------- HEADER ---------------- */
  header{
    text-align:center;
    padding:22px 16px 28px;
    margin-bottom:24px;
    position:relative;
    border-bottom:2px solid var(--line);
  }
  header::before, header::after{
    content:"❖";
    color:var(--rune-gold);
    font-size:14px;
    position:absolute;
    bottom:-11px;
    left:50%;
    transform:translateX(-50%);
    background:var(--forest-deep);
    padding:0 10px;
  }
  .crest{
    font-size:34px;
    letter-spacing:6px;
    text-transform:uppercase;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    font-weight:800;
    color:var(--rune-gold-bright);
    text-shadow:0 2px 0 #00000080, 0 0 18px rgba(232,185,85,0.25);
    margin:0;
  }
  .crest span{ color:var(--parchment); }
  .subtitle{
    margin:8px 0 0;
    color:var(--parchment-dark);
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
  }

  /* ---------------- SEARCH ---------------- */
  .search-box{
    position:relative;
    margin-bottom:18px;
  }
  #searchInput{
    width:100%;
    padding:16px 50px 16px 20px;
    font-size:18px;
    font-family:'Georgia',serif;
    background:var(--parchment-light);
    color:var(--ink-black);
    border:3px solid var(--line);
    border-radius:3px;
    outline:none;
    box-shadow:inset 0 2px 6px rgba(0,0,0,0.25);
  }
  #searchInput::placeholder{ color:#6b5d3c; font-style:italic; }
  #searchInput:focus{ border-color:var(--rune-gold); box-shadow:inset 0 2px 6px rgba(0,0,0,0.25), 0 0 0 3px rgba(201,149,47,0.25); }
  .search-icon{
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    font-size:20px; color:#6b5d3c; pointer-events:none;
  }

  /* ---------------- FILTER CHIPS ---------------- */
  .filters{
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    margin-bottom:28px;
  }
  .chip{
    padding:7px 16px;
    border:1px solid var(--line);
    border-radius:20px;
    background:rgba(231,217,180,0.07);
    color:var(--parchment-dark);
    font-size:13px;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    letter-spacing:0.5px;
    cursor:pointer;
    transition:all 0.15s ease;
    user-select:none;
  }
  .chip:hover{ background:rgba(201,149,47,0.15); color:var(--parchment); }
  .chip.active{
    background:var(--rune-gold);
    color:var(--forest-deep);
    border-color:var(--rune-gold-bright);
    font-weight:700;
  }

  /* ---------------- RESULTS META ---------------- */
  .results-meta{
    text-align:center;
    color:var(--parchment-dark);
    font-size:13px;
    font-style:italic;
    margin-bottom:18px;
    min-height:18px;
  }

  /* ---------------- CARD GRID ---------------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
  }

  .card{
    background:linear-gradient(180deg, var(--parchment-light), var(--parchment));
    border:2px solid var(--line);
    border-radius:6px;
    padding:16px 18px;
    color:var(--ink-black);
    cursor:pointer;
    transition:transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    box-shadow:0 3px 0 rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.15);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; width:5px; height:100%;
    background:var(--cat-color, var(--rune-gold));
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 14px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.2);
    border-color:var(--rune-gold);
  }

  .card-top{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .card-icon{ font-size:26px; line-height:1; }
  .card-name{ font-size:18px; font-weight:700; margin:0; color:var(--forest); }
  .card-cat{
    display:inline-block;
    margin-top:2px;
    font-size:10.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    color:#fff;
    background:var(--cat-color, var(--rune-gold));
    padding:2px 8px;
    border-radius:10px;
  }
  .card-summary{
    font-size:13.5px;
    color:#4a4126;
    margin:8px 0 0;
    line-height:1.4;
    font-style:italic;
  }
  .card-hint{
    margin-top:10px;
    font-size:12px;
    color:#6b5d3c;
    border-top:1px dashed #8a7445aa;
    padding-top:8px;
  }

  /* category color coding */
  .cat-Crop, .cat-Fruit-Raw-Food, .cat-Crop-Ingredient, .cat-Fruit-Crop{ --cat-color:#5c7a3a; }
  .cat-Ingredient, .cat-Crop-Ingredient{ --cat-color:#a06a26; }
  .cat-Raw-Food{ --cat-color:#8a5a2e; }
  .cat-Fish{ --cat-color:#2c6b8a; }
  .cat-Boss, .cat-Boss-Duo{ --cat-color:#7a2424; }
  .cat-Biome{ --cat-color:#1f5c3a; }
  .cat-Crafting-Station{ --cat-color:#42596a; }
  .cat-Flower{ --cat-color:#a8447a; }

  /* ---------------- MODAL ---------------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,10,8,0.78);
    display:none; align-items:center; justify-content:center;
    padding:20px; z-index:100;
    backdrop-filter:blur(2px);
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:linear-gradient(180deg, var(--parchment-light), var(--parchment-dark));
    border:3px solid var(--rune-gold);
    border-radius:8px;
    max-width:560px; width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:26px 28px 24px;
    color:var(--ink-black);
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-close{
    position:absolute; top:14px; right:16px;
    background:none; border:none; font-size:22px;
    cursor:pointer; color:#5a4f30; line-height:1;
  }
  .modal-close:hover{ color:var(--blood); }
  .modal-header{ display:flex; align-items:center; gap:14px; margin-bottom:4px; }
  .modal-icon{ font-size:38px; }
  .modal-title{ font-size:26px; font-weight:800; color:var(--forest); margin:0; }
  .modal-cat{
    display:inline-block; margin-top:6px;
    font-size:11px; letter-spacing:1px; text-transform:uppercase;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    color:#fff; background:var(--cat-color, var(--rune-gold));
    padding:3px 10px; border-radius:10px;
  }
  .modal-summary{
    margin:14px 0 18px; font-style:italic; color:#4a4126;
    border-left:3px solid var(--rune-gold); padding-left:12px;
  }
  .section-label{
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--blood); font-weight:700; margin:18px 0 8px;
  }
  .source-item{
    background:rgba(255,255,255,0.35);
    border:1px solid #8a7445aa;
    border-radius:4px;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:14.5px;
    line-height:1.45;
  }
  .source-type{
    font-weight:700; color:var(--forest);
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    font-size:12px; text-transform:uppercase; letter-spacing:0.5px;
    display:block; margin-bottom:2px;
  }
  .used-for-list{ margin:0; padding-left:20px; font-size:14px; line-height:1.6; }

  /* ---------------- EMPTY STATE ---------------- */
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--parchment-dark);
  }
  .empty-state .glyph{ font-size:40px; opacity:0.6; margin-bottom:10px; }

  /* ---------------- FOOTER ---------------- */
  footer{
    text-align:center; margin-top:50px; padding-top:18px;
    border-top:1px solid var(--line);
    color:var(--parchment-dark); font-size:12px; font-style:italic;
  }

  @media (max-width:480px){
    .crest{ font-size:24px; letter-spacing:3px; }
    .grid{ grid-template-columns:1fr; }
  }
</style>
</head>

<script>
  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('searchInput');
  const filtersEl = document.getElementById('filters');
  const resultsMeta = document.getElementById('resultsMeta');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');

  let activeCategory = 'All';

  function catClass(cat){
    return 'cat-' + cat.replace(/[\s/&]+/g, '-');
  }

  // Build category chip list dynamically (grouping similar ones)
  const categoryGroups = {
    'All': () => true,
    'Crops & Farming': c => /Crop|Fruit|Flower/.test(c),
    'Ingredients': c => c === 'Ingredient',
    'Raw Food & Fish': c => /Raw Food|Fish/.test(c),
    'Bosses': c => /Boss/.test(c),
    'Biomes': c => c === 'Biome',
    'Crafting Stations': c => c === 'Crafting Station'
  };

  Object.keys(categoryGroups).forEach(label => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (label === 'All' ? ' active' : '');
    chip.textContent = label;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCategory = label;
      render();
    });
    filtersEl.appendChild(chip);
  });

  function matchesCategory(item){
    if(activeCategory === 'All') return true;
    return categoryGroups[activeCategory](item.category);
  }

  function matchesSearch(item, q){
    if(!q) return true;
    q = q.toLowerCase();
    if(item.name.toLowerCase().includes(q)) return true;
    if(item.category.toLowerCase().includes(q)) return true;
    if(item.summary && item.summary.toLowerCase().includes(q)) return true;
    if(item.sources && item.sources.some(s => (s.type + ' ' + s.detail).toLowerCase().includes(q))) return true;
    if(item.usedFor && item.usedFor.some(u => u.toLowerCase().includes(q))) return true;
    return false;
  }

  function render(){
    const q = searchInput.value.trim();
    const results = NECESSE_DB.filter(item => matchesCategory(item) && matchesSearch(item, q));

    grid.innerHTML = '';

    if(results.length === 0){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="glyph">⚱</div>
        <div>No entries found. Try a different search term — e.g. "lemon," "sugar," or "queen spider."</div>
      </div>`;
      resultsMeta.textContent = '';
      return;
    }

    resultsMeta.textContent = `${results.length} entr${results.length === 1 ? 'y' : 'ies'} found`;

    results.forEach(item => {
      const card = document.createElement('div');
      card.className = `card ${catClass(item.category)}`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon">${item.icon || '❖'}</div>
          <div>
            <p class="card-name">${item.name}</p>
            <span class="card-cat">${item.category}</span>
          </div>
        </div>
        ${item.summary ? `<p class="card-summary">${item.summary}</p>` : ''}
        <div class="card-hint">${item.sources.length} source${item.sources.length > 1 ? 's' : ''} listed — click to view</div>
      `;
      card.addEventListener('click', () => openModal(item));
      grid.appendChild(card);
    });
  }

  function openModal(item){
    modalContent.className = catClass(item.category);
    modalContent.innerHTML = `
      <button class="modal-close" id="modalCloseBtn">✕</button>
      <div class="modal-header">
        <div class="modal-icon">${item.icon || '❖'}</div>
        <div>
          <h2 class="modal-title">${item.name}</h2>
          <span class="modal-cat">${item.category}</span>
        </div>
      </div>
      ${item.summary ? `<p class="modal-summary">${item.summary}</p>` : ''}
      <div class="section-label">Where to get it</div>
      ${item.sources.map(s => `
        <div class="source-item">
          <span class="source-type">${s.type}</span>
          ${s.detail}
        </div>
      `).join('')}
      ${item.usedFor ? `
        <div class="section-label">Used for</div>
        <ul class="used-for-list">
          ${item.usedFor.map(u => `<li>${u}</li>`).join('')}
        </ul>
      ` : ''}
    `;
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    modalOverlay.classList.add('show');
  }

  function closeModal(){
    modalOverlay.classList.remove('show');
  }

  modalOverlay.addEventListener('click', e => {
    if(e.target === modalOverlay) closeModal();
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
  });

  searchInput.addEventListener('input', render);

  render();
</script>
